services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: learnloop
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: learnloop
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
      - uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
      - uploads:/app/uploads
    command: arq app.tasks.worker.WorkerSettings

volumes:
  pgdata:
  uploads:

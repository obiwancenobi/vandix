name: vandix
description: "Vandix - Turn school materials into fun learning activities"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9

  # State management (Riverpod 2.x — compatible with current Flutter)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # HTTP
  dio: ^5.9.2

  # i18n
  easy_localization: ^3.0.8

  # Storage
  flutter_secure_storage: ^9.2.4

  # UI
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.3.0

  # File picking
  image_picker: ^1.2.2
  file_picker: ^8.3.7

  # Utils
  intl: ^0.20.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.5.4
  riverpod_generator: ^2.6.4
  freezed: ^2.5.8
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true

  assets:
    - assets/i18n/
